# =============================================================
# inventory/hosts.yml
# Network device inventory — YAML format
# YAML inventory supports env lookups; .ini format does NOT
# =============================================================

all:
  children:

    # ── IOS-XE Devices ───────────────────────────────────────
    iosxe:
      vars:
        ansible_network_os: cisco.ios.ios
        ansible_connection: network_cli
        ansible_user: "{{ lookup('env', 'NETWORK_USERNAME') }}"
        ansible_password: "{{ lookup('env', 'NETWORK_PASSWORD') }}"
        ansible_become: yes
        ansible_become_method: enable
        ansible_become_password: "{{ lookup('env', 'ENABLE_PASSWORD') }}"
      hosts:
        iosxe-router-01:
          ansible_host: "{{ lookup('env', 'IOSXE_R1_IP') }}"
        iosxe-router-02:
          ansible_host: "{{ lookup('env', 'IOSXE_R2_IP') }}"
        iosxe-switch-01:
          ansible_host: "{{ lookup('env', 'IOSXE_SW1_IP') }}"

    # ── NX-OS Devices ────────────────────────────────────────
    nxos:
      vars:
        ansible_network_os: cisco.nxos.nxos
        ansible_connection: network_cli
        ansible_user: "{{ lookup('env', 'NETWORK_USERNAME') }}"
        ansible_password: "{{ lookup('env', 'NETWORK_PASSWORD') }}"
      hosts:
        nxos-switch-01:
          ansible_host: "{{ lookup('env', 'NXOS_SW1_IP') }}"
        nxos-switch-02:
          ansible_host: "{{ lookup('env', 'NXOS_SW2_IP') }}"

    # ── FTD Devices ──────────────────────────────────────────
    ftd:
      vars:
        ansible_network_os: cisco.asa.asa
        ansible_connection: network_cli
        ansible_user: "{{ lookup('env', 'FTD_USERNAME') }}"
        ansible_password: "{{ lookup('env', 'FTD_PASSWORD') }}"
      hosts:
        ftd-firewall-01:
          ansible_host: "{{ lookup('env', 'FTD_IP') }}"

    # ── Group: all network devices ────────────────────────────
    network:
      children:
        iosxe:
        nxos:
        ftd:
