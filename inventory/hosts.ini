# =============================================================
# inventory/hosts.ini
# Network device inventory for Ansible
# =============================================================

# ── IOS-XE Devices ───────────────────────────────────────────
[iosxe]
iosxe-router-01  ansible_host={{ lookup('env', 'IOSXE_R1_IP') }}
iosxe-router-02  ansible_host={{ lookup('env', 'IOSXE_R2_IP') }}
iosxe-switch-01  ansible_host={{ lookup('env', 'IOSXE_SW1_IP') }}

# ── NX-OS Devices ────────────────────────────────────────────
[nxos]
nxos-switch-01   ansible_host={{ lookup('env', 'NXOS_SW1_IP') }}
nxos-switch-02   ansible_host={{ lookup('env', 'NXOS_SW2_IP') }}

# ── FTD Devices ──────────────────────────────────────────────
[ftd]
ftd-firewall-01  ansible_host={{ lookup('env', 'FTD_IP') }}

# ── All Network Devices ───────────────────────────────────────
[network:children]
iosxe
nxos
ftd

# ── Group Variables ───────────────────────────────────────────
[iosxe:vars]
ansible_network_os=cisco.ios.ios
ansible_connection=network_cli
ansible_user={{ lookup('env', 'NETWORK_USERNAME') }}
ansible_password={{ lookup('env', 'NETWORK_PASSWORD') }}
ansible_become=yes
ansible_become_method=enable
ansible_become_password={{ lookup('env', 'ENABLE_PASSWORD') }}

[nxos:vars]
ansible_network_os=cisco.nxos.nxos
ansible_connection=network_cli
ansible_user={{ lookup('env', 'NETWORK_USERNAME') }}
ansible_password={{ lookup('env', 'NETWORK_PASSWORD') }}

[ftd:vars]
ansible_network_os=cisco.asa.asa
ansible_connection=network_cli
ansible_user={{ lookup('env', 'FTD_USERNAME') }}
ansible_password={{ lookup('env', 'FTD_PASSWORD') }}
